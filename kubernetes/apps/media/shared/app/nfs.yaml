---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nas-media
  finalizers:
    - nas.home.arpa/do-not-delete
spec:
  capacity:
    storage: 50Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - noatime
    - soft
    - timeo=50
    - retrans=5
    - actimeo=10
    - nconnect=4
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: "${CARDHU_NAS_IP}/volume1/warehouse1##"
    volumeAttributes:
      server: "${CARDHU_NAS_IP}"
      share: /volume1/warehouse1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nas-media
spec:
  volumeName: nas-media
  volumeMode: Filesystem
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
