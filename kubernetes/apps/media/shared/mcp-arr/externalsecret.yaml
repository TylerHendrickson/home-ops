---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-arr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mcp-arr-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        LIDARR_API_KEY: "{{ .LIDARR_API_KEY }}"
        SONARR_API_KEY: "{{ .SONARR_API_KEY }}"
        RADARR_API_KEY: "{{ .RADARR_API_KEY }}"
        PROWLARR_API_KEY: "{{ .PROWLARR_API_KEY }}"
  dataFrom:
    - extract:
        key: lidarr
    - extract:
        key: sonarr
    - extract:
        key: radarr
    - extract:
        key: prowlarr
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-arr-basic-auth
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mcp-arr-basic-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # nginx-ingress reads htpasswd from the `auth` key when annotation
        # `auth-secret-type: auth-file` is set.
        auth: "{{ .htpasswd }}"
  dataFrom:
    - extract:
        key: mcp-arr
