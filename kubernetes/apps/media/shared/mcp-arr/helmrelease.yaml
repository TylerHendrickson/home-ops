---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-arr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: mcp-arr
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            # renovate: datasource=docker depName=ghcr.io/tylerhendrickson/mcp-arr
            image:
              repository: ghcr.io/tylerhendrickson/mcp-arr
              tag: 1.6.5@sha256:ba1a1d6109face80f79648a689da7973668b957732d5e2a7bf7e32ec03901ef8
            env:
              LIDARR_URL: http://lidarr.media.svc.cluster.local
              SONARR_URL: http://sonarr.media.svc.cluster.local
              RADARR_URL: http://radarr.media.svc.cluster.local
              PROWLARR_URL: http://prowlarr.media.svc.cluster.local
            envFrom:
              - secretRef:
                  name: mcp-arr-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 60
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: *port
    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          nginx.ingress.kubernetes.io/auth-type: basic
          nginx.ingress.kubernetes.io/auth-secret: mcp-arr-basic-auth
          nginx.ingress.kubernetes.io/auth-secret-type: auth-file
          nginx.ingress.kubernetes.io/auth-realm: mcp-arr
        hosts:
          - host: &host "mcp-arr.int.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - *host
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
