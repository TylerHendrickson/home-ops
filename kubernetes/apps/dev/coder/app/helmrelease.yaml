---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder
  namespace: dev
spec:
  interval: 30m
  chart:
    spec:
      chart: coder
      version: 2.33.6
      sourceRef:
        kind: HelmRepository
        name: coder
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    coder:
      initContainers:
        - name: 01-init-db
          image: ghcr.io/home-operations/postgres-init:18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: coder-secret
      serviceAccount:
        enableDeployments: true
        workspacePerms: true
        name: coder
        annotations: {}
      env:
        # DB
        - name: CODER_PG_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: CODER_PG_CONNECTION_URL
        # App
        - name: CODER_ACCESS_URL
          value: "https://coder.${SECRET_DOMAIN}"
        - name: CODER_WILDCARD_ACCESS_URL
          value: "*.coder.${SECRET_DOMAIN}"
        - name: CODER_TELEMETRY
          value: "false"
        - name: CODER_PROMETHEUS_ENABLE
          value: "true"
        #- name: CODER_DISABLE_PATH_APPS
        #  value: "true"
        # GitHub
        - name: CODER_GITAUTH_0_ID
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: CODER_GITAUTH_0_ID
        - name: CODER_GITAUTH_0_TYPE
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: CODER_GITAUTH_0_TYPE
        - name: CODER_GITAUTH_0_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: CODER_GITAUTH_0_CLIENT_ID
        - name: CODER_GITAUTH_0_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: CODER_GITAUTH_0_CLIENT_SECRET
        # GitHub OAuth
        - name: CODER_OAUTH2_GITHUB_ALLOW_SIGNUPS
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: CODER_OAUTH2_GITHUB_ALLOW_SIGNUPS
        - name: CODER_OAUTH2_GITHUB_ALLOWED_ORGS
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: CODER_OAUTH2_GITHUB_ALLOWED_ORGS
        - name: CODER_OAUTH2_GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: CODER_OAUTH2_GITHUB_CLIENT_ID
        - name: CODER_OAUTH2_GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: coder-secret
              key: CODER_OAUTH2_GITHUB_CLIENT_SECRET
      service:
        type: ClusterIP
      ingress:
        enable: true
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
        host: "coder.${SECRET_DOMAIN}"
        wildcardHost: "*.coder.${SECRET_DOMAIN}"
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/worker
                operator: In
                values:
                - "true"
