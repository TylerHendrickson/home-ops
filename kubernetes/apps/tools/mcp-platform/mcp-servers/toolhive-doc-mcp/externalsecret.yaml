---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive-doc-mcp-basic-auth
  namespace: mcp-platform
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: toolhive-doc-mcp-basic-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # nginx-ingress reads htpasswd from the `auth` key when annotation
        # `auth-secret-type: auth-file` is set.
        auth: "{{ .htpasswd }}"
  dataFrom:
    - extract:
        key: toolhive-doc-mcp
