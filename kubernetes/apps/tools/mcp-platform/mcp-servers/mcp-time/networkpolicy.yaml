---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-time-egress-deny
  namespace: mcp-platform
spec:
  podSelector:
    matchLabels:
      toolhive-name: mcp-time
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
