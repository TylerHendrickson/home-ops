---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-mcp
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: grafana-mcp
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    grafana:
      url: "http://grafana.observability.svc.cluster.local"
      apiKeySecret:
        name: grafana-mcp-secret
        key: token
    disableWrite: true
    disabledCategories: []
    service:
      enabled: true
      type: ClusterIP
      port: 8000
    ingress:
      enabled: true
      className: internal
      hosts:
        - host: &host "grafana-mcp.int.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - *host
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceMonitor:
      enabled: true
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
    podAnnotations:
      reloader.stakater.com/auto: "true"
