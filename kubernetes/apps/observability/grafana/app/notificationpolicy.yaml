---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafananotificationpolicy_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaNotificationPolicy
metadata:
  name: grafana-notification-policy
spec:
  instanceSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  # This CR owns the entire root routing tree. Pushover is the sole destination
  # today, so the root receiver catches everything; add nested `routes` with
  # object_matchers here if label-based fan-out is ever needed.
  route:
    receiver: pushover
    group_by:
      - grafana_folder
      - alertname
