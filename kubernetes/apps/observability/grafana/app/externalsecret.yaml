---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-pushover
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-pushover-secret
    creationPolicy: Owner
  # Explicit per-field mapping (not dataFrom.extract): the `grafana` 1P item is
  # shared and holds other fields we don't want surfaced in this Secret.
  data:
    - secretKey: apiToken
      remoteRef:
        key: grafana
        property: PUSHOVER_API_TOKEN
    - secretKey: userKey
      remoteRef:
        key: grafana
        property: PUSHOVER_USER_KEY
