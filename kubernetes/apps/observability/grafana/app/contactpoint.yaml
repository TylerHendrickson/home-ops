---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanacontactpoint_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: pushover
spec:
  instanceSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  name: pushover
  receivers:
    - type: pushover
      settings:
        # Pushover integration settings (see https://github.com/grafana/alerting/blob/main/receivers/pushover/v1/config.go)
        #   apiToken + userKey (injected via valuesFrom below) are required fields.
        #   Numbers are quoted (Grafana stores these as strings).
        #   Defaults below are the notifier's code defaults.
        priority: "0"  # alerting priority: -2 (lowest) … 2 (emergency); default "0" (normal)
        # okPriority: "0"     # priority for resolved/OK notifications; default "0"
        # retry: "30"         # seconds between repeats; ONLY used for emergency priority (2); min 30
        # expire: "3600"      # seconds the emergency notification keeps retrying; ONLY priority 2; max 10800
        # sound: ""           # alerting sound; blank = recipient's Pushover default
        # okSound: ""         # sound for resolved/OK notifications; blank = default
        # device: ""          # comma-separated device names; blank = all devices
        # title: ""           # templated notification title; blank = Grafana's default title template
        # message: ""         # templated notification body; blank = Grafana's default message template
        # uploadImage: true   # attach rendered panel image to the notification; default true (boolean, not quoted)
      valuesFrom:
        - targetPath: apiToken
          valueFrom:
            secretKeyRef:
              name: grafana-pushover-secret
              key: apiToken
        - targetPath: userKey
          valueFrom:
            secretKeyRef:
              name: grafana-pushover-secret
              key: userKey
