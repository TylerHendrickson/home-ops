---
name: Build and push Docker images

on:
  push:
    branches: [main]
    paths:
      - docker/**/Dockerfile
  workflow_dispatch:
    inputs:
      images:
        description: Comma-separated image names to rebuild (e.g. "mcp-arr,vikunja-mcp")
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed Dockerfiles
        if: github.event_name == 'push'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            mcp-arr:
              - docker/mcp-arr/Dockerfile
            vikunja-mcp:
              - docker/vikunja-mcp/Dockerfile
          list-files: json
          base: ${{ github.event.repository.default_branch }}

      - name: Resolve image matrix
        id: matrix
        env:
          INPUT_IMAGES: ${{ inputs.images }}
          FILTER_CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            matrix=$(echo "$INPUT_IMAGES" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          else
            matrix="$FILTER_CHANGES"
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "matrix: $matrix"

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Set registry owner lowercase
        id: registry
        env:
          REPOSITORY_OWNER: "${{ github.repository_owner }}"
        run: |
          owner=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract versions from Dockerfile
        id: versions
        run: |
          DOCKERFILE="docker/${{ matrix.image }}/Dockerfile"

          # Extract mcp-proxy version
          MCP_PROXY=$(grep -E '^ARG MCP_PROXY_VERSION=' "$DOCKERFILE" | sed 's/.*=//')

          # Extract primary version from the first non-MCP_PROXY ARG
          PRIMARY_VERSION=$(grep -E '^ARG ' "$DOCKERFILE" | grep -v 'MCP_PROXY_VERSION' | head -1 | sed 's/.*=//')

          echo "primary_version=$PRIMARY_VERSION" >> $GITHUB_OUTPUT
          echo "mcp_proxy=$MCP_PROXY" >> $GITHUB_OUTPUT

      - name: Build Docker image (load)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/${{ matrix.image }}/Dockerfile
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            mcp-arr-server.version=${{ steps.versions.outputs.mcp_arr }}
            mcp-proxy.version=${{ steps.versions.outputs.mcp_proxy }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          trivyignores: docker/${{ matrix.image }}/.trivyignore

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on fixable CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: docker/${{ matrix.image }}/.trivyignore

      - name: Push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/${{ matrix.image }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            mcp-arr-server.version=${{ steps.versions.outputs.mcp_arr }}
            mcp-proxy.version=${{ steps.versions.outputs.mcp_proxy }}
