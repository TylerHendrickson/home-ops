---
name: Build and push Docker images

on:
  push:
    branches: [main]
    paths:
      - docker/**/Dockerfile
  workflow_dispatch:
    inputs:
      images:
        description: Comma-separated image names to rebuild (e.g. "mcp-arr,vikunja-mcp")
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Detect changed Dockerfiles
        if: github.event_name == 'push'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            mcp-arr:
              - docker/mcp-arr/Dockerfile
            vikunja-mcp:
              - docker/vikunja-mcp/Dockerfile
            tar-backup:
              - docker/tar-backup/Dockerfile
          list-files: json
          base: ${{ github.event.repository.default_branch }}

      - name: Resolve image matrix
        id: matrix
        env:
          INPUT_IMAGES: ${{ inputs.images }}
          FILTER_CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            matrix=$(echo "$INPUT_IMAGES" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          else
            matrix="$FILTER_CHANGES"
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "matrix: $matrix"

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Set registry owner lowercase
        id: registry
        env:
          REPOSITORY_OWNER: "${{ github.repository_owner }}"
        run: |
          owner=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract versions from Dockerfile
        id: versions
        run: |
          DOCKERFILE="docker/${{ matrix.image }}/Dockerfile"
          IMG="${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}"

          # `|| true` keeps a non-matching grep from aborting the step under `set -eo pipefail`.
          # Publish tag: the image-owned IMAGE_VERSION if present, else the upstream MCP server
          # version (keeps the MCP images auto-tagged by their upstream version, as today).
          PRIMARY_VERSION=$(grep -E '^ARG IMAGE_VERSION=' "$DOCKERFILE" | sed 's/.*=//' || true)
          [ -n "$PRIMARY_VERSION" ] || PRIMARY_VERSION=$(grep -E '^ARG MCP_VERSION=' "$DOCKERFILE" | sed 's/.*=//' || true)
          MCP_SERVER=$(grep -E '^ARG MCP_VERSION=' "$DOCKERFILE" | sed 's/.*=//' || true)
          MCP_PROXY=$(grep -E '^ARG MCP_PROXY_VERSION=' "$DOCKERFILE" | sed 's/.*=//' || true)

          echo "primary_version=$PRIMARY_VERSION" >> "$GITHUB_OUTPUT"

          # Labels: generic OCI labels on every image; MCP version labels only when present.
          {
            echo 'labels<<EOF'
            echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
            echo "org.opencontainers.image.revision=${{ github.sha }}"
            echo "org.opencontainers.image.title=${{ matrix.image }}"
            echo "org.opencontainers.image.version=${PRIMARY_VERSION}"
            [ -n "$MCP_SERVER" ] && echo "mcp-server.version=${MCP_SERVER}"
            [ -n "$MCP_PROXY" ] && echo "mcp-proxy.version=${MCP_PROXY}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          # Push tags: the version tag always; `latest` only for tar-backup.
          {
            echo 'tags<<EOF'
            echo "${IMG}:${PRIMARY_VERSION}"
            [ "${{ matrix.image }}" = "tar-backup" ] && echo "${IMG}:latest"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Resolve build platforms
        id: platforms
        run: |
          if [ "${{ matrix.image }}" = "tar-backup" ]; then
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image (load)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: docker/${{ matrix.image }}
          file: docker/${{ matrix.image }}/Dockerfile
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          labels: ${{ steps.versions.outputs.labels }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          trivyignores: docker/${{ matrix.image }}/.trivyignore

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on fixable CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: docker/${{ matrix.image }}/.trivyignore

      - name: Push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: docker/${{ matrix.image }}
          file: docker/${{ matrix.image }}/Dockerfile
          push: true
          platforms: ${{ steps.platforms.outputs.value }}
          tags: ${{ steps.versions.outputs.tags }}
          labels: ${{ steps.versions.outputs.labels }}
