---
name: Build and push Docker images

on:
  push:
    branches: [main]
    paths:
      - docker/**/Dockerfile
      - .github/workflows/build-docker-images.yaml

env:
  REGISTRY: ghcr.io

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed Dockerfiles
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            mcp-arr:
              - docker/mcp-arr/Dockerfile
              - .github/workflows/build-docker-images.yaml
          list-files: json
          base: ${{ github.event.repository.default_branch }}

      - name: Debug filter output
        run: |
          echo "changes: ${{ steps.filter.outputs.changes }}"
          echo "mcp-arr: ${{ steps.filter.outputs.mcp-arr }}"
          echo "mcp-arr_files: ${{ steps.filter.outputs.mcp-arr_files }}"

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Set registry owner lowercase
        id: registry
        env:
          REPOSITORY_OWNER: "${{ github.repository_owner }}"
        run: |
          owner=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract versions from Dockerfile
        id: versions
        run: |
          DOCKERFILE="docker/${{ matrix.image }}/Dockerfile"
          echo "DEBUG: DOCKERFILE=$DOCKERFILE"
          echo "DEBUG: File exists: $(test -f "$DOCKERFILE" && echo yes || echo no)"
          echo "DEBUG: File contents:"
          cat "$DOCKERFILE"
          echo "---"

          # Extract versions from ARG lines (skip comments)
          MCP_ARR=$(grep -E '^ARG MCP_ARR_VERSION=' "$DOCKERFILE" | sed 's/.*=//')
          MCP_PROXY=$(grep -E '^ARG MCP_PROXY_VERSION=' "$DOCKERFILE" | sed 's/.*=//')

          echo "DEBUG: MCP_ARR=$MCP_ARR"
          echo "DEBUG: MCP_PROXY=$MCP_PROXY"

          # Use MCP_ARR_VERSION as primary version
          PRIMARY_VERSION="$MCP_ARR"

          echo "primary_version=$PRIMARY_VERSION" >> $GITHUB_OUTPUT
          echo "mcp_arr=$MCP_ARR" >> $GITHUB_OUTPUT
          echo "mcp_proxy=$MCP_PROXY" >> $GITHUB_OUTPUT

          echo "Image version: $PRIMARY_VERSION (mcp-arr: $MCP_ARR, mcp-proxy: $MCP_PROXY)"

      - name: Build Docker image (load)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/${{ matrix.image }}/Dockerfile
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            mcp-arr-server.version=${{ steps.versions.outputs.mcp_arr }}
            mcp-proxy.version=${{ steps.versions.outputs.mcp_proxy }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@bc0b696b4103f5fe60f15749af68a046868d511a # v2.25.4
        with:
          sarif_file: trivy-results.sarif

      - name: Check for critical vulnerabilities
        run: |
          if grep -q '"level": "critical"' trivy-results.sarif; then
            echo "Critical vulnerabilities found in ${{ matrix.image }}, aborting push"
            exit 1
          fi

      - name: Push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/${{ matrix.image }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.registry.outputs.owner }}/${{ matrix.image }}:${{ steps.versions.outputs.primary_version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            mcp-arr-server.version=${{ steps.versions.outputs.mcp_arr }}
            mcp-proxy.version=${{ steps.versions.outputs.mcp_proxy }}
